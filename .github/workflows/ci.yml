name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify-proofs:
    runs-on: ubuntu-latest
    name: Verify Coq Proofs (Ubuntu 25.10)
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Coq 8.18+
        run: |
          sudo apt-get update
          sudo apt-get install -y coq
      
      - name: Compile Coq proofs
        run: make coq
        timeout-minutes: 2
      
      - name: Verify stability proofs
        run: make verify
        timeout-minutes: 1

  build-bpf:
    runs-on: ubuntu-latest
    name: Build eBPF Programs (Ubuntu 25.10)
    steps:
      - uses: actions/checkout@v4
      
      - name: Install LLVM, clang & BPF tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-20 llvm-20 libbpf-dev linux-headers-generic
          
          # Critical fix for Ubuntu 25.10 asm/types.h symlink
          sudo ln -sf /usr/include/x86_64-linux-gnu/asm /usr/include/asm
      
      - name: Verify symlink
        run: ls -la /usr/include/asm && echo "✓ Symlink verified"
      
      - name: Compile BPF with clang-20
        run: |
          export CLANG=clang-20
          export LLC=llc-20
          make bpf
        timeout-minutes: 5
      
      - name: Verify BPF object files
        run: |
          file bpf/dwell_monitor.bpf.o
          ls -lh bpf/dwell_monitor.bpf.o
          echo "✓ BPF binary compiled successfully"

  build-daemon:
    runs-on: ubuntu-latest
    name: Build Go Daemon (Ubuntu 25.10, Go 1.24)
    needs: build-bpf
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go 1.24
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      
      - name: Verify Go version
        run: go version && echo "✓ Go 1.24 ready"
      
      - name: Install BPF dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-20 llvm-20 libbpf-dev
          sudo ln -sf /usr/include/x86_64-linux-gnu/asm /usr/include/asm
      
      - name: Build eBPF
        run: |
          export CLANG=clang-20
          export LLC=llc-20
          make bpf
      
      - name: Build daemon binary
        run: make daemon
      
      - name: Verify daemon binary
        run: |
          file ./bin/dwell-fiber-daemon
          ldd ./bin/dwell-fiber-daemon | head -10
          echo "✓ Go daemon compiled successfully"

  test:
    runs-on: ubuntu-latest
    name: Run Go Tests (Ubuntu 25.10)
    needs: build-daemon
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go 1.24
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      
      - name: Install BPF dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-20 llvm-20 libbpf-dev
          sudo ln -sf /usr/include/x86_64-linux-gnu/asm /usr/include/asm
      
      - name: Build eBPF
        run: |
          export CLANG=clang-20
          export LLC=llc-20
          make bpf
      
      - name: Run unit tests
        run: make test
        timeout-minutes: 5

  security:
    runs-on: ubuntu-latest
    name: Security Scan (Gosec)
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go 1.24
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      
      - name: Run gosec security scan
        uses: securego/gosec@master
        with:
          args: '-no-fail -fmt json -out results.json ./daemon ./pkg'
      
      - name: Check scan results
        run: |
          if [ -f results.json ]; then
            echo "Scan completed. Issues found:"
            cat results.json | jq '.Issues[].Title' || echo "✓ No issues found"
          fi

  lint:
    runs-on: ubuntu-latest
    name: Lint Go Code
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go 1.24
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      
      - name: Run linter on daemon
        run: cd daemon && golangci-lint run --timeout=5m --allow-serial-runners || true

  docs:
    runs-on: ubuntu-latest
    name: Verify Documentation
    steps:
      - uses: actions/checkout@v4
      
      - name: Verify core documentation files
        run: |
          echo "Checking documentation..."
          test -f README.md && echo "  ✓ README.md" || (echo "  ✗ README.md MISSING" && exit 1)
          test -f USER_GUIDE.md && echo "  ✓ USER_GUIDE.md" || (echo "  ✗ USER_GUIDE.md MISSING" && exit 1)
          test -f CHANGELOG.md && echo "  ✓ CHANGELOG.md" || (echo "  ✗ CHANGELOG.md MISSING" && exit 1)
          test -f docs/architecture.md && echo "  ✓ docs/architecture.md" || (echo "  ✗ docs/architecture.md MISSING" && exit 1)
          test -f coq/dwell_stable.v && echo "  ✓ coq/dwell_stable.v" || (echo "  ✗ coq/dwell_stable.v MISSING" && exit 1)
          echo "✓ All documentation verified"

  summary:
    runs-on: ubuntu-latest
    name: CI Summary
    needs: [verify-proofs, build-bpf, build-daemon, test, security, lint, docs]
    if: always()
    steps:
      - name: Generate CI summary
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║         Dwell-Fiber CI Pipeline Summary (Ubuntu 25.10)    ║"
          echo "╠════════════════════════════════════════════════════════════╣"
          echo "║ Coq Proofs:      ${{ needs.verify-proofs.result }}"
          echo "║ eBPF Build:      ${{ needs.build-bpf.result }}"
          echo "║ Go Daemon:       ${{ needs.build-daemon.result }}"
          echo "║ Tests:           ${{ needs.test.result }}"
          echo "║ Security Scan:   ${{ needs.security.result }}"
          echo "║ Lint:            ${{ needs.lint.result }}"
          echo "║ Documentation:   ${{ needs.docs.result }}"
          echo "╚════════════════════════════════════════════════════════════╝"
      
      - name: Fail if critical checks failed
        if: |
          needs.verify-proofs.result != 'success' ||
          needs.build-bpf.result != 'success' ||
          needs.build-daemon.result != 'success' ||
          needs.test.result != 'success' ||
          needs.docs.result != 'success'
        run: |
          echo "❌ Critical CI checks failed!"
          exit 1
      
      - name: Success message
        if: success()
        run: |
          echo "✓ All critical checks passed!"
          echo "✓ Ready for deployment"


          
